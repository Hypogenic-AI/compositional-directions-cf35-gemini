idea:
  title: Which linear directions are compositional?
  domain: nlp
  hypothesis: 'Not all linear directions in the residual stream of Transformer LLMs
    form coherent linear subspaces that can be composed; only related vectors (such
    as those for similar concepts like "red" and "blue") compose naturally, while
    others may only appear approximately linear in limited contexts.

    '
  background:
    description: 'The idea questions the assumption that linear representations in
      the residual stream of Transformer LLMs form a linear space where directions
      can be composed. It suggests that only related vectors compose naturally, and
      proposes to systematically examine which discovered linear directions are coherent
      subspaces versus singular, approximately linear directions.

      '
  metadata:
